<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat Overlay</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Stint+Ultra+Condensed&display=swap" rel="stylesheet">

  <style>
    /* ─── Base reset ─────────────────────────────────────────── */
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: transparent;
      overflow: hidden;
    }

    /* TODO: Would be useful in a config that could specify fallback fonts */
    @import url('https://fonts.googleapis.com/css2?family=Stint+Ultra+Condensed&display=swap');
    :root{
        --bgcolor: #103306;
        --CloseColor: #20630c;
    }
    *{
        font-family: "Stint Ultra Condensed", serif;
        font-weight: 400;
        font-style: normal;
    }
    .main-container {
        position: relative;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        align-content: flex-start;
        height: 1080px;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        padding-left: 50px;
        padding-right: 8px;
        padding-bottom: 24px;
    }

    .message-row {
        position: relative;
        height: fit-content;
        width: 100%;
        float: left;
        background-color: transparent;
        padding-bottom: 12px;
        padding-top: 12px;
    }

    .main-container-transition {
        transition: all 500ms linear;
    }
    span.pronouns {
        margin-left: 0.5em;
    }
    svg.tooth {
        width: 70%;
        height: auto;
        position: absolute;
        bottom: -10px;
        left: 28px;
    }
    .message-container {
        position: relative;
        animation-name: messageBubblePop;
        animation-duration: .75s;
        animation-timing-function: ease-out;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
        opacity: 0;
    }

    .alert-container {
        animation-name: messageBubblePop;
        animation-duration: .75s;
        animation-timing-function: ease-out;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
        opacity: 0;
	    width: 1400px;
    }
    .message-bubble {
        position: relative;
        width: 35%;
        height: fit-content;
        overflow: visible;
        box-sizing: border-box;
        border-radius: 48px;
        border: 4px solid #AB9F76;
        background: linear-gradient(180deg, #E5D7A7 0%, #AB9F76 100%);
    }
    .alert-bubble {
        position: relative;
        width: 35%;
        left: 20%;
        transform: translateX(-50%);
        height: 62px;
        overflow: visible;
        box-sizing: border-box;
        background: linear-gradient(180deg, #BEC2CD 40%, #9EA0A9 40%);
    }
    img.mango {
        height: 72px;
        width: auto;
        position: absolute;
        top: 0px;
        right: 1px;
        transform: translateX(100%);
    }
    img.punta {
        height: 72px;
        width: auto;
        position: absolute;
        top: 0px;
        left: 1px;
        transform: translateX(-100%);
    }
    svg.pluma {
        position: absolute;
        bottom: 12px;
        left: -40px;
        width: 200px;
        height: auto;
        pointer-events: none;
    }
    .badge{
        visibility: visible;
        vertical-align: baseline;
        display: inline;
        height: 0.8em;   
        width: auto;
        padding-right: 8px;
    }
    .user-box {
        display: flex;
        align-items: center;
        z-index: 10;
        clear: both;
        box-sizing: border-box;
        text-transform: uppercase;
        position: relative;
        width: fit-content;
        height: 48px;
        border-radius: 32px;
        padding-left: 1em;
        padding-right: 1em;
        padding-top: 0.15em;
        padding-bottom: 0.15em;
        left: 32px;
        top: -12px;
        background-color: black;
        color: #ffffff;
        font-size: 30px;
    }

    .user-message {
        position: relative;
        display: flex;
        overflow: visible;
        text-align: left;
        align-items: center;
        padding-left: 1.1em;
        padding-right: 1.1em;
        padding-top: 1em;
        padding-bottom: 1em;
        width: 100%;
        word-break: break-word;
        color: #241f21;
        background: transparent;
        box-sizing: border-box;
        font-size: 48px;
        line-height: 34px;
        min-height: 28px;
        justify-content: left;
        flex-wrap: wrap;
    }
    svg.head {
        width: 180px;
        height: auto;
        position: absolute;
        top: -76px;
        right: 1160px;
        z-index: -2;
        pointer-events: none;
    }
    svg.pluma {
        position: absolute;
        bottom: -36px;
        left: -48px;
        width: 200px;
        height: auto;
        pointer-events: none;
    }
    img.key {
        position: absolute;
        bottom: -30px;
        width: 64px;
        right: 14px;
        filter: brightness(0.25);
    }
    img.mickey {
        position: absolute;
        left: -10px;
        bottom: -54px;
        width: 40px;
        height: auto;
        filter: brightness(0.25);
    }

    .alert-message {
        display: flex;
        overflow: visible;
        text-align: left;
        align-items: center;
        padding-left: 2em;
        padding-right: 2em;
        padding-top: 1em;
        padding-bottom: 1em;
        width: 100%;
        word-break: break-word;
        color: #ffffff;
        background: transparent;
        box-sizing: border-box;
        font-size: 30px;
        line-height: 1em;
        min-height: 28px;
        justify-content: center;
        position: relative;
        bottom: 16px;
    }

    .icon {
        position: absolute;
        width: 84px;
        height: auto;
        top: calc(50% - 16px);
        left: 5%;
        fill: #FFEAA0;
    }

    .icon path {
        fill: #FFEAA0;
        stroke: #7000b3;
        stroke-width: 1px;
    }

    .role {
        position: absolute;
        z-index: 1;
        right: -8px;
        top: -8px;
        transform-origin: center;
        height: 72px;
        width: auto;
        vertical-align: top;
        border: 5px #fff solid;
        border-radius: 50%;
        background-color: #fff;
        transform: scale(0);
        transform-origin: center;
        animation-name: iconWiggle;
        animation-delay: 0.35s;
        animation-duration: 0.75s;
        animation-timing-function: ease-out;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
    }

    .role img {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
    }

    .emote-1 {
        width: auto;
        height: 48px;
        vertical-align: middle;
        background-repeat: no-repeat;
        margin-left: 5px;
        margin-right: 5px;
    }

    .emote-2 {
        width: auto;
        height: 96px;
        vertical-align: middle;
        background-repeat: no-repeat;
        margin-left: 5px;
        margin-right: 5px;
    }

    .emote-3 {
        width: auto;
        height: 48px;
        vertical-align: middle;
        background-repeat: no-repeat;
        margin-left: 5px;
        margin-right: 5px;
    }

    .emote-4 {
        width: auto;
        height: 48px;
        vertical-align: middle;
        background-repeat: no-repeat;
        margin-left: 5px;
        margin-right: 5px;
    }

    .left {
        position: absolute;
        left: -98px;
        bottom: -30px;
        animation-delay: 0.25s;
        animation: wingleft 1s ease-out 1 forwards;
    }

    .right {
        position: absolute;
        right: -122px;
        bottom: -30px;
        animation-delay: 0.25s;
        animation: wingright 1s ease-out 1 forwards;
    }

    .float {
        animation: float 6s ease-in-out infinite;
    }

    .emote {
        height: 28px;
        vertical-align: middle;
        background-repeat: no-repeat;
    }

    .fadeOut {
        animation-name: fadeOut;
        animation-duration: 0.5s;
        animation-timing-function: ease-out;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
    }
    @keyframes iconWiggle{
        0%{ transform: rotate(0deg) scale(0); }
        25%{ transform: rotate(10deg) scale(1); }
        50%{ transform: rotate(-10deg) scale(1.05); }
        100%{ transform: rotate(0deg) scale(1); }
    }
    @keyframes box{
        0%{ transform: scaleX(0); }
        75%{ transform: scaleX(1.05); }
        100%{ transform: scaleX(1); }
    }
    @keyframes fadeOut {
        0% { opacity: 1; transform: translateY(0px); }
        100% { opacity: 0; transform: translateY(-32px); }
    }
    @keyframes messageBubblePop {
        0% { transform: translateY(12px); opacity: 0; }
        100% { transform: translateY(0px); opacity: 1; }
    }

    /* ── Dev toolbar (only visible when ?dev=1 in the URL) ── */
    #dev-toolbar {
      display: none;
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      flex-direction: column;
      align-items: flex-end;
    }
    #dev-toolbar button {
      background: rgba(0,0,0,0.75);
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    #dev-toolbar button:hover { background: #333; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     OVERLAY MARKUP
     ═══════════════════════════════════════════════════════ -->
<div class="main-container"></div>

<!-- ═══════════════════════════════════════════════════════
     DEV TOOLBAR  (shown only when URL contains ?dev=1)
     Open the overlay in a browser with ?dev=1 to test it.
     ═══════════════════════════════════════════════════════ -->
<div id="dev-toolbar">
  <button onclick="testMessage()">▶ Test Message</button>
  <button onclick="demoMessages(7, 3)">▶ Demo (7 msgs)</button>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIGURATION  — edit these to match your stream settings
   ═══════════════════════════════════════════════════════════ */
const CONFIG = {
  channelName:    "capnceedee",   // your Twitch username
  messagesLimit:  5,              // max visible messages
  hideAfter:      999,            // seconds before auto-hide (999 = never)
  hideCommands:   "yes",          // hide !commands: "yes" | "no"
  ignoredUsers:   [],             // e.g. ["somebot", "anotherbot"]
  botNames:       ["streamelements"],
  badgeDisplay:   "visible",      // "visible" | "hidden"
  pronounsMode:   "visible",      // "visible" | "hidden"
  ShowAlerts:     "visible",      // "visible" | "hidden"

  // Alert messages — $User = username, $Amount = number
  FollowAlertMessage:   "$User hopped on the airship!",
  SubAlertMessage:      "$User officially joined the crew!",
  GiftSubAlertMessage:  "$User recruited $Amount crewmates!",
  RaidAlertMessage:     "$User and their crew of $Amount raided!",
  CheerAlertMessage:    "$User cheered $Amount bits!",
  TipAlertMessage:      "$User tipped $Amount$",

  // Alert titles (used as the username field in alert rows)
  FollowAlertTittle:    "New Follower!",
  SubAlertTittle:       "New Sub!",
  GiftSubAlertTittle:   "Gift Subs!",
  RaidAlertTittle:      "Raid!",
  CheerAlertTittle:     "Cheer!",
  TipAlertTittle:       "Tip!",

  // Role badge images (StreamElements CDN URLs from original widget)
  picBroadcaster: 'https://cdn.streamelements.com/uploads/b017d2bc-5a50-4dfc-bb38-a5878f265dd5.png',
  picMod:         'https://cdn.streamelements.com/uploads/b017d2bc-5a50-4dfc-bb38-a5878f265dd5.png',
  picVip:         'https://cdn.streamelements.com/uploads/dfa2cb5b-c40e-400d-8e82-be97942203e7.png',
  picSub:         'https://cdn.streamelements.com/uploads/dfa2cb5b-c40e-400d-8e82-be97942203e7.png',
  picNonsub:      'https://cdn.streamelements.com/uploads/48d7bb11-b4dd-47c9-95a6-0b55a47a47b5.png',
};


/* ═══════════════════════════════════════════════════════════
   INTERNAL STATE
   ═══════════════════════════════════════════════════════════ */
let totalMessages = 0;
let removeSelector;
let animationIn  = 'fadeIn';
let fadeOut      = 'fadeOut';
let side         = 'right';
let textVar      = 0;
let provider     = 'twitch';

// Build removeSelector from limit
removeSelector = ".message-row:nth-last-child(n+" + (CONFIG.messagesLimit + 1) + ")";


/* ═══════════════════════════════════════════════════════════
   PRONOUNS API
   ═══════════════════════════════════════════════════════════ */
const Widget = { pronouns: {}, pronounsCache: {} };
const PRONOUNS_API_BASE = 'https://pronouns.alejo.io/api';
const PRONOUNS_API = {
  user:    username => `${PRONOUNS_API_BASE}/users/${username}`,
  pronouns: `${PRONOUNS_API_BASE}/pronouns`,
};

async function getPronouns() {
  const res = await apiFetch(PRONOUNS_API.pronouns);
  if (res) res.forEach(p => { Widget.pronouns[p.name] = p.display; });
}

async function getUserPronoun(username) {
  if (CONFIG.pronounsMode === 'hidden') return null;
  const key = username.toLowerCase();
  let cached = Widget.pronounsCache[key];
  if (!cached || cached.expire < Date.now()) {
    const res = await apiFetch(PRONOUNS_API.user(key));
    const [data] = res || [{}];
    Widget.pronounsCache[key] = { ...data, expire: Date.now() + 300000 };
    cached = Widget.pronounsCache[key];
  }
  if (!cached || !cached.pronoun_id) return null;
  return Widget.pronouns[cached.pronoun_id] || null;
}

async function apiFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

if (CONFIG.pronounsMode !== 'hidden') {
  getPronouns();
}


/* ═══════════════════════════════════════════════════════════
   COMFYJS BRIDGE RECEIVER
   ───────────────────────────────────────────────────────────
   Connects to the local bridge.js server (which runs ComfyJS
   and reads real Twitch chat) via a plain WebSocket on port
   7474.

   START ORDER:
     1. Run start.bat / start.sh  → bridge.js connects to Twitch
     2. OBS loads this overlay    → overlay connects to bridge
     3. Chat appears in real time

   The overlay auto-reconnects if the bridge restarts.
   ═══════════════════════════════════════════════════════════ */
const BRIDGE_PORT = 7474;   // must match WS_PORT in bridge.js
let   bridgeWs   = null;

function connectBridge() {
  try {
    bridgeWs = new WebSocket(`ws://127.0.0.1:${BRIDGE_PORT}`);
  } catch(e) {
    console.warn('[Bridge] WebSocket unavailable, retrying in 5s');
    setTimeout(connectBridge, 5000);
    return;
  }

  bridgeWs.onopen = () => {
    console.log('[Bridge] Connected to chat bridge ✓');
  };

  bridgeWs.onmessage = async (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }
    await handleBridgeMessage(msg);
  };

  bridgeWs.onclose = () => {
    console.log('[Bridge] Disconnected — retrying in 5s...');
    setTimeout(connectBridge, 5000);
  };

  bridgeWs.onerror = () => {
    // Silently swallow — onclose fires next and retries
  };
}

async function handleBridgeMessage(msg) {
  switch (msg.type) {

    // ── Chat message ──────────────────────────────────────────
    case 'chat': {
      if (msg.message.startsWith('!') && CONFIG.hideCommands === 'yes') return;
      if (CONFIG.ignoredUsers.includes(msg.user.toLowerCase())) return;
      if (CONFIG.botNames.includes(msg.user.toLowerCase())) return;

      // Determine role from flags
      let role = 'viewer';
      if (msg.flags.broadcaster)                                    role = 'broadcaster';
      else if (msg.flags.mod)                                       role = 'mod';
      else if (msg.flags.vip)                                       role = 'vip';
      else if (msg.flags.subscriber || msg.flags.founder)           role = 'subscriber';

      // Build badge HTML from the badge array bridge sends
      let badgeHtml = '';
      if (CONFIG.badgeDisplay === 'visible') {
        for (const b of (msg.badges || [])) {
          badgeHtml += `<img alt="" src="${b.url}" class="badge"> `;
        }
      }

      // Build a data-like object for attachEmotes
      // ComfyJS emotes are already in SE-compatible format from bridge.js
      const fakeData = {
        text:   msg.message,
        emotes: msg.emotes || [],
      };
      const fakeRendered = { renderedText: undefined };
      const processedMessage = attachEmotes(fakeData, fakeRendered, fakeData);

      const pronouns = await getUserPronoun(msg.displayName);
      const isHighlight = false; // ComfyJS doesn't expose highlight flag directly

      addMessage(
        msg.displayName,
        badgeHtml,
        processedMessage,
        msg.isAction,
        msg.userId,
        msg.msgId,
        role,
        isHighlight,
        'datas',
        pronouns,
        msg.color
      );
      break;
    }

    // ── Mod: delete single message ────────────────────────────
    case 'delete-message': {
      $(`.message-row[data-msgid="${msg.msgId}"]`).remove();
      break;
    }

    // ── Mod: delete all messages from a user (ban/timeout) ───
    case 'delete-messages': {
      $(`.message-row[data-sender="${msg.userId}"]`).remove();
      break;
    }

    // ── Alerts ────────────────────────────────────────────────
    case 'sub': {
      if (CONFIG.ShowAlerts === 'visible')
        addMessage(CONFIG.SubAlertTittle, '', CONFIG.SubAlertMessage, false, msg.amount, '', 'sub', false, msg.name);
      break;
    }
    case 'gift-subs': {
      if (CONFIG.ShowAlerts === 'visible')
        addMessage(CONFIG.GiftSubAlertTittle, '', CONFIG.GiftSubAlertMessage, false, msg.amount, '', 'gift-subs', false, msg.name);
      break;
    }
    case 'cheer': {
      if (CONFIG.ShowAlerts === 'visible')
        addMessage(CONFIG.CheerAlertTittle, '', CONFIG.CheerAlertMessage, false, msg.amount, '', 'cheers', false, msg.name);
      break;
    }
    case 'raid': {
      if (CONFIG.ShowAlerts === 'visible')
        addMessage(CONFIG.RaidAlertTittle, '', CONFIG.RaidAlertMessage, false, msg.amount, '', 'raid', false, msg.name);
      break;
    }
  }
}

// Start the bridge connection immediately
connectBridge();


/* ═══════════════════════════════════════════════════════════
   STREAMELEMENTS EVENT LISTENERS
   These work unchanged when the file is loaded inside SE,
   and are safely ignored when running locally.
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('onWidgetLoad', function(obj) {
  // When running in StreamElements, fieldData overrides CONFIG
  const fd = obj.detail.fieldData;
  CONFIG.hideAfter        = fd.hideAfter        ?? CONFIG.hideAfter;
  CONFIG.messagesLimit    = fd.messagesLimit     ?? CONFIG.messagesLimit;
  CONFIG.hideCommands     = fd.hideCommands      ?? CONFIG.hideCommands;
  CONFIG.channelName      = obj.detail.channel.username ?? CONFIG.channelName;
  CONFIG.badgeDisplay     = fd.badgeDisplay      ?? CONFIG.badgeDisplay;
  CONFIG.ShowAlerts       = fd.ShowAlerts        ?? CONFIG.ShowAlerts;
  CONFIG.pronounsMode     = fd.pronounsMode      ?? CONFIG.pronounsMode;

  CONFIG.FollowAlertTittle   = fd.FollowAlertTittle   ?? CONFIG.FollowAlertTittle;
  CONFIG.FollowAlertMessage  = fd.FollowAlertMessage  ?? CONFIG.FollowAlertMessage;
  CONFIG.SubAlertTittle      = fd.SubAlertTittle      ?? CONFIG.SubAlertTittle;
  CONFIG.SubAlertMessage     = fd.SubAlertMessage     ?? CONFIG.SubAlertMessage;
  CONFIG.GiftSubAlertTittle  = fd.GiftSubAlertTittle  ?? CONFIG.GiftSubAlertTittle;
  CONFIG.GiftSubAlertMessage = fd.GiftSubAlertMessage ?? CONFIG.GiftSubAlertMessage;
  CONFIG.RaidAlertTittle     = fd.RaidAlertTittle     ?? CONFIG.RaidAlertTittle;
  CONFIG.RaidAlertMessage    = fd.RaidAlertMessage    ?? CONFIG.RaidAlertMessage;
  CONFIG.CheerAlertTittle    = fd.CheerAlertTittle    ?? CONFIG.CheerAlertTittle;
  CONFIG.CheerAlertMessage   = fd.CheerAlertMessage   ?? CONFIG.CheerAlertMessage;
  CONFIG.TipAlertTittle      = fd.TipAlertTittle      ?? CONFIG.TipAlertTittle;
  CONFIG.TipAlertMessage     = fd.TipAlertMessage     ?? CONFIG.TipAlertMessage;

  if (fd.ignoredUsers) {
    CONFIG.ignoredUsers = fd.ignoredUsers.toLowerCase().replace(' ','').split(',');
  }
  if (fd.botNames) {
    CONFIG.botNames = fd.botNames.toLowerCase().replace(' ','').split(',');
  }

  removeSelector = ".message-row:nth-last-child(n+" + (CONFIG.messagesLimit + 1) + ")";

  fetch('https://api.streamelements.com/kappa/v2/channels/' + obj.detail.channel.id + '/')
    .then(r => r.json())
    .then(profile => { provider = profile.provider; })
    .catch(() => {});

  if (CONFIG.pronounsMode !== 'hidden') getPronouns();
});

window.addEventListener('onEventReceived', async function(obj) {
  // Button tests from SE editor
  if (obj.detail.event && obj.detail.event.listener === 'widget-button') {
    if (obj.detail.event.field === 'testMessage')  testMessage();
    if (obj.detail.event.field === 'demoMessages') demoMessages(7, 3);
    return;
  }

  // Mod actions
  if (obj.detail.listener === 'delete-message') {
    const msgId = obj.detail.event.msgId;
    $(`.message-row[data-msgid=${msgId}]`).remove();
    return;
  }
  if (obj.detail.listener === 'delete-messages') {
    const sender = obj.detail.event.userId;
    $(`.message-row[data-sender=${sender}]`).remove();
    return;
  }

  // Alerts
  const AL = obj.detail.listener;
  const AD = obj.detail.event;
  if (CONFIG.ShowAlerts === 'visible') {
    const gift   = AD['bulkGifted'];
    const gifted = AD['gifted'];
    const amt    = AD['amount'];
    const name   = AD['name'];
    if      (AL === 'subscriber-latest' && gift === true)                    addMessage(CONFIG.GiftSubAlertTittle, '', CONFIG.GiftSubAlertMessage, false, amt,  '', 'gift-subs', false, name);
    else if (AL === 'subscriber-latest' && gift === undefined && gifted === undefined) addMessage(CONFIG.SubAlertTittle, '', CONFIG.SubAlertMessage, false, amt, '', 'sub', false, name);
    else if (AL === 'cheer-latest')     addMessage(CONFIG.CheerAlertTittle,  '', CONFIG.CheerAlertMessage,  false, amt,  '', 'cheers', false, name);
    else if (AL === 'raid-latest')      addMessage(CONFIG.RaidAlertTittle,   '', CONFIG.RaidAlertMessage,   false, amt,  '', 'raid',   false, name);
    else if (AL === 'tip-latest')       addMessage(CONFIG.TipAlertTittle,    '', CONFIG.TipAlertMessage,    false, amt,  '', 'tip',    false, name);
    else if (AL === 'follower-latest')  addMessage(CONFIG.FollowAlertTittle, '', CONFIG.FollowAlertMessage, false, '',   '', 'follow', false, name);
  }

  // Chat message
  if (obj.detail.listener !== 'message') return;
  const data        = obj.detail.event.data;
  const renderedText= obj.detail.event;
  if (data.text.startsWith('!') && CONFIG.hideCommands === 'yes') return;
  if (CONFIG.ignoredUsers.indexOf(data.nick) !== -1) return;

  const message = attachEmotes(data, renderedText, obj.detail.event.data);
  let badges = '', role = '';

  if (CONFIG.botNames.indexOf(data.nick) !== -1) {
    role = 'bot';
  } else if (data.tags['badges']) {
    const b = data.tags['badges'];
    if      (b.includes('broadcaster')) role = 'broadcaster';
    else if (b.includes('mod'))         role = 'mod';
    else if (b.includes('vip'))         role = 'vip';
    else if (b.includes('subscriber') || b.includes('founder')) role = 'subscriber';
    else if (b.includes('artist-badge')) role = 'artist';
    else                                role = 'viewer';
  } else { role = 'viewer'; }

  if (CONFIG.badgeDisplay === 'visible') {
    for (const badge of data.badges) {
      badges += `<img alt="" src="${badge.url}" class="badge"> `;
    }
  }

  const pronouns  = await getUserPronoun(data.displayName);
  const namecolor = data.displayColor;
  addMessage(data.displayName, badges, message, data.isAction, data.userId, data.msgId, role, data.tags['msg-id'] === 'highlighted-message', 'datas', pronouns, namecolor);
});

// Cache of BTTV + 7TV emotes: { name -> url }
const thirdPartyEmotes = {};

async function loadThirdPartyEmotes() {
  const channel = CONFIG.channelName.toLowerCase();

  // BTTV global
  try {
    const r = await fetch('https://api.betterttv.net/3/cached/emotes/global');
    const d = await r.json();
    d.forEach(e => { thirdPartyEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/2x`; });
  } catch {}

  // BTTV channel — need channel ID first
  try {
    const ur = await fetch(`https://api.betterttv.net/3/cached/users/twitch/${await getTwitchUserId(channel)}`);
    const ud = await ur.json();
    [...(ud.channelEmotes || []), ...(ud.sharedEmotes || [])].forEach(e => {
      thirdPartyEmotes[e.code] = `https://cdn.betterttv.net/emote/${e.id}/2x`;
    });
  } catch {}

  // 7TV global
  try {
    const r = await fetch('https://7tv.io/v3/emote-sets/global');
    const d = await r.json();
    (d.emotes || []).forEach(e => {
      const file = e.data?.host?.files?.find(f => f.name === '2x.webp') || e.data?.host?.files?.[0];
      if (file) thirdPartyEmotes[e.name] = `https:${e.data.host.url}/${file.name}`;
    });
  } catch {}

  // 7TV channel
  try {
    const r = await fetch(`https://7tv.io/v3/users/twitch/${await getTwitchUserId(channel)}`);
    const d = await r.json();
    (d.emote_set?.emotes || []).forEach(e => {
      const file = e.data?.host?.files?.find(f => f.name === '2x.webp') || e.data?.host?.files?.[0];
      if (file) thirdPartyEmotes[e.name] = `https:${e.data.host.url}/${file.name}`;
    });
  } catch {}
}

// Cache Twitch user ID (needed for BTTV/7TV channel lookups)
let _twitchUserId = null;
async function getTwitchUserId(login) {
  if (_twitchUserId) return _twitchUserId;
  // Try to get it from the SE API if available, otherwise fall back to Ivr
  try {
    const r = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${login}`);
    const d = await r.json();
    _twitchUserId = d?.[0]?.id || null;
    return _twitchUserId;
  } catch { return null; }
}

// Start loading third-party emotes immediately
loadThirdPartyEmotes();

function attachEmotes(message, renderedText, messsagedata) {
  const emoteClass = 'emote-1'; // default; solo-emote sizing removed for simplicity
  const twitchEmotes = message.emotes || [];

  // Step 1: build the raw text
  let text = message.text || '';

  // Step 2: replace Twitch emotes by position
  // Sort by start position ascending, then build the output by walking through segments
  const positioned = twitchEmotes
    .filter(e => e.type === 'twitch' && typeof e.start === 'number')
    .sort((a, b) => a.start - b.start);

  if (positioned.length > 0) {
    let result = '';
    let cursor = 0;
    // Use Array.from so positions are code-point based (matches Twitch's indexing)
    const codePoints = Array.from(text);
    for (const emote of positioned) {
      // Append plain text before this emote
      result += html_encode(codePoints.slice(cursor, emote.start).join(''));
      // Append the emote image
      const url = `https://static-cdn.jtvnw.net/emoticons/v2/${emote.id}/default/dark/2.0`;
      result += `<img class="${emoteClass}" src="${url}"/>`;
      cursor = emote.end + 1;
    }
    // Append any remaining text after the last emote
    result += html_encode(codePoints.slice(cursor).join(''));
    text = result;
  } else {
    text = html_encode(text);
  }

  // Step 3: replace BTTV/7TV emotes by name in the plain-text segments only.
  // Split on HTML tags, process only the non-tag parts.
  text = text.split(/(<[^>]+>)/).map(segment => {
    // If this segment is an HTML tag, pass it through untouched
    if (segment.startsWith('<')) return segment;

    // Otherwise check each word for third-party emotes
    return segment.replace(/\S+/g, word => {
      if (thirdPartyEmotes[word]) {
        return `<img class="${emoteClass}" src="${thirdPartyEmotes[word]}" title="${word}"/>`;
      }
      // SE-style named Twitch emotes (fallback for StreamElements path)
      const match = twitchEmotes.find(e => e.name && e.name === word);
      if (match) {
        const url = match.urls?.[4] || match.urls?.[2] || match.urls?.[1];
        if (url) return `<img class="${emoteClass}" src="${url}"/>`;
      }
      return word;
    });
  }).join('');

  // Handle image attachments
  if (message.attachment?.media?.image) {
    text += `<img src="${message.attachment.media.image.src}">`;
  }

  return text;
}

function html_encode(e) {
  return e.replace(/[<>"^]/g, c => '&#' + c.charCodeAt(0) + ';');
}

function isRemainingTextEmpty(data) {
  let { text, emotes } = data;
  if (emotes && emotes.length > 0) {
    emotes.forEach(e => { text = text.replace(e.name, ''); });
  }
  return text;
}

function animateContainer() {
  const container = $('.main-container')[0];
  const lastChild = container.children[container.children.length - 1];
  const height    = $(lastChild).height();
  $(container).removeClass('main-container-transition');
  container.style.marginTop = height + 'px';
  setTimeout(function(c) {
    c.style.marginTop    = '0px';
    c.style.marginBottom = '0px';
    $(c).addClass('main-container-transition');
  }, 15, container);

  if (totalMessages > CONFIG.messagesLimit) removeRow();
}

function removeRow() {
  if (!$(removeSelector).length) return;
  if (fadeOut !== 'none' || !$(removeSelector).hasClass(fadeOut)) {
    if (CONFIG.hideAfter !== 999) {
      $(removeSelector).dequeue();
    } else {
      $(removeSelector).addClass('fadeOut');
      setTimeout(() => { $(removeSelector).remove(); }, 500);
    }
    return;
  }
  $(removeSelector).fadeOut(500, function() { $(this).remove(); });
}
